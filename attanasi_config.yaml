# =============================================================================
# Attanasi, Centorrino & Moscati (2021) — Perfect Competition Replication
# "Controlling monopoly power in a double-auction market experiment"
# JPET 23(5), 1074-1101
# =============================================================================

# --- Experimental Parameters (from online appendix) ---
experiment:
  name: "Attanasi et al. (2021) Perfect Competition"
  num_sellers: 4
  num_buyers: 24
  seller_cost: 12          # Uniform cost for all sellers, all units
  buyer_valuations:        # Per group of 6 buyers (4 identical groups = 24)
    - 20
    - 17
    - 15
    - 13
    - 8
    - 0
  num_groups: 4            # 4 identical groups of 6 buyers
  seller_capacity: 24      # Units per seller per period (effectively unlimited)
  buyer_capacity: 1        # Each buyer can buy 1 unit per period
  num_periods: 3           # Trading periods
  price_range: [0, 30]     # Integer prices only
  num_steps: 30            # Trading rounds per period
  idle_rounds_to_stop: 5   # Spec 5: stop period after N idle rounds

  # Competitive equilibrium benchmarks
  competitive_equilibrium:
    price: 12.5            # CE price range 12-13
    quantity: 16           # 4 groups × 4 buyers with value > cost

  # Human results from Table B.1 (Co played first)
  human_benchmarks:
    avg_prices: [14.49, 14.10, 13.50]
    periods: [1, 2, 3]

